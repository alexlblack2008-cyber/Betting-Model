name: Zone Model — Daily Picks

on:
  schedule:
    # 10 AM ET = 14:00 UTC (15:00 UTC during EDT, but GitHub uses UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  run-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Zone Model pipeline
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM:           ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:             ${{ secrets.GMAIL_TO }}
          BANKROLL:             "1000"
        run: |
          cd zone_model
          python cron_entry.py

      - name: Commit updated ledger
        run: |
          git config user.name "Zone Model Bot"
          git config user.email "actions@github.com"
          git add zone_model/ledger.json
          git diff --cached --quiet || git commit -m "chore: update ledger after daily picks run [skip ci]"
          git push
