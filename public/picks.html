<title>Zone Model — Picks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
<style>
  :root {
    --bg:          #0D1017;
    --surface:     #161B28;
    --surface2:    #1D2235;
    --border:      #252C40;
    --text:        #DDE3F0;
    --muted:       #5D6680;
    --accent:      #F5A623;
    --accent-dim:  #3A2700;
    --win:         #34C77B;
    --win-dim:     #0D3320;
    --loss:        #E5484D;
    --loss-dim:    #3A0D0E;
    --push:        #6B7490;
    --push-dim:    #1E2130;
    --pending:     #F5A623;
    --pending-dim: #3A2700;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#F6F4EF; --surface:#EDEAE2; --surface2:#E4E0D6; --border:#CFC9BB;
      --text:#1A1F30; --muted:#7A7260; --accent:#C47D00; --accent-dim:#FEF0CC;
      --win:#1A8A4A; --win-dim:#D4F5E3; --loss:#C02025; --loss-dim:#FCE0E0;
      --push:#6B7490; --push-dim:#E0DDD7; --pending:#C47D00; --pending-dim:#FEF0CC;
    }
  }
  :root[data-theme="dark"] {
    --bg:#0D1017;--surface:#161B28;--surface2:#1D2235;--border:#252C40;
    --text:#DDE3F0;--muted:#5D6680;--accent:#F5A623;--accent-dim:#3A2700;
    --win:#34C77B;--win-dim:#0D3320;--loss:#E5484D;--loss-dim:#3A0D0E;
    --push:#6B7490;--push-dim:#1E2130;--pending:#F5A623;--pending-dim:#3A2700;
  }
  :root[data-theme="light"] {
    --bg:#F6F4EF;--surface:#EDEAE2;--surface2:#E4E0D6;--border:#CFC9BB;
    --text:#1A1F30;--muted:#7A7260;--accent:#C47D00;--accent-dim:#FEF0CC;
    --win:#1A8A4A;--win-dim:#D4F5E3;--loss:#C02025;--loss-dim:#FCE0E0;
    --push:#6B7490;--push-dim:#E0DDD7;--pending:#C47D00;--pending-dim:#FEF0CC;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    height: 52px;
  }
  .logo {
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  #live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--win); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #theme-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--muted); padding: 5px 10px; font-size: 14px; cursor: pointer;
  }

  /* ── Page ── */
  .page { max-width: 600px; margin: 0 auto; padding: 16px 12px 80px; }

  .section-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  /* ── Stat grid ── */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 14px 12px;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); opacity: 0; transition: opacity .3s;
  }
  .stat-card.loaded::after { opacity: 1; }
  .stat-card.wide { grid-column: span 2; }
  .sc-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .sc-value {
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 26px; font-weight: 700; line-height: 1; color: var(--text);
  }
  .stat-card.wide .sc-value { font-size: 22px; }
  .sc-value.pos { color: var(--win); }
  .sc-value.neg { color: var(--loss); }
  .sc-value.amber { color: var(--accent); }
  .sc-sub { margin-top: 5px; font-size: 11px; color: var(--muted); }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* ── Filter tabs ── */
  .filter-tabs {
    display: flex; gap: 6px; margin-bottom: 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 2px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .ftab {
    flex-shrink: 0; background: none; border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted);
    padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: all .15s;
  }
  .ftab.active { background: var(--accent); border-color: var(--accent); color: #0D1017; }
  .pick-count { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

  /* ── Pick cards ── */
  .pick-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 10px;
    overflow: hidden; position: relative;
  }
  .stripe {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .stripe.won     { background: var(--win); }
  .stripe.lost    { background: var(--loss); }
  .stripe.push    { background: var(--push); }
  .stripe.pending { background: var(--pending); }

  .card-inner { padding: 14px 14px 14px 20px; }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px;
  }
  .teams { font-size: 15px; font-weight: 600; line-height: 1.35; }
  .teams .away { font-size: 12px; color: var(--muted); font-weight: 400; }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; flex-shrink: 0; margin-left: 8px;
  }
  .badge.won     { background: var(--win-dim);     color: var(--win); }
  .badge.lost    { background: var(--loss-dim);    color: var(--loss); }
  .badge.push    { background: var(--push-dim);    color: var(--push); }
  .badge.pending { background: var(--pending-dim); color: var(--pending); }

  /* 4-col stats row */
  .card-stats { display: flex; }
  .cs {
    flex: 1; min-width: 0;
    border-right: 1px solid var(--border);
    padding-right: 10px; margin-right: 10px;
  }
  .cs:last-child { border-right: none; padding-right: 0; margin-right: 0; }
  .cs-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 3px;
  }
  .cs-value {
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .cs-value.over    { color: var(--accent); }
  .cs-value.under   { color: #6BBBF5; }
  .cs-value.pos     { color: var(--win); }
  .cs-value.neg     { color: var(--loss); }
  .cs-value.dimmed  { color: var(--muted); }

  /* confidence bar */
  .conf-wrap { margin-top: 12px; }
  .conf-label-row {
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .conf-row { display: flex; align-items: center; gap: 8px; }
  .conf-track {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .conf-fill { height: 100%; background: var(--accent); border-radius: 2px; }
  .conf-pct { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  .card-footer {
    margin-top: 10px; font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ── Stake / Settle forms ── */
  .stake-row {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .stake-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    width: 100%; margin-bottom: 2px;
  }
  .stake-input {
    flex: 1; min-width: 80px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px 10px;
    font-size: 14px; font-family: "SF Mono","Cascadia Code",monospace;
    -webkit-appearance: none;
  }
  .stake-input:focus { outline: none; border-color: var(--accent); }
  .stake-sep { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .stake-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--accent); font-weight: 700; font-size: 12px;
    padding: 8px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .stake-btn:active { opacity: .8; }
  .settle-row {
    margin-top: 8px;
    display: flex; gap: 8px; align-items: center;
  }
  .settle-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px 12px;
    font-size: 15px; font-family: "SF Mono","Cascadia Code",monospace;
    -webkit-appearance: none;
  }
  .settle-input:focus { outline: none; border-color: var(--accent); }
  .settle-btn {
    background: var(--accent); border: none; border-radius: 6px;
    color: #0D1017; font-weight: 700; font-size: 13px;
    padding: 8px 16px; cursor: pointer; white-space: nowrap;
  }
  .settle-btn:active { opacity: .8; }
  .settle-msg { font-size: 12px; margin-top: 6px; }
  .settle-msg.ok  { color: var(--win); }
  .settle-msg.err { color: var(--loss); }

  /* ── States ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 120px; gap: 8px; color: var(--muted);
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
</style>

<header class="header">
  <span class="logo">Zone Model</span>
  <div class="header-right">
    <span id="live-badge"><span id="live-dot"></span> Live</span>
    <button id="theme-btn" onclick="toggleTheme()">☀︎</button>
  </div>
</header>

<div class="page">

  <div class="section-label">This Week</div>
  <div class="stat-grid">
    <div class="stat-card" id="sc-wl">
      <div class="sc-label">W / L / P</div>
      <div class="sc-value" id="sw-wl">—</div>
      <div class="sc-sub" id="sw-wl-sub"></div>
    </div>
    <div class="stat-card" id="sc-pending">
      <div class="sc-label">Pending</div>
      <div class="sc-value amber" id="sw-pending">—</div>
      <div class="sc-sub" id="sw-pending-sub"></div>
    </div>
    <div class="stat-card" id="sc-pnl">
      <div class="sc-label">Net P&amp;L</div>
      <div class="sc-value" id="sw-pnl">—</div>
      <div class="sc-sub" id="sw-pnl-sub">$100 / pick</div>
    </div>
    <div class="stat-card" id="sc-roi">
      <div class="sc-label">ROI</div>
      <div class="sc-value" id="sw-roi">—</div>
      <div class="sc-sub">breakeven 52.4%</div>
    </div>
  </div>

  <div class="section-label">All Time</div>
  <div class="stat-grid">
    <div class="stat-card wide" id="sc-at-wl">
      <div class="sc-label">Record</div>
      <div class="sc-value" id="at-wl">—</div>
      <div class="sc-sub" id="at-wl-sub"></div>
    </div>
    <div class="stat-card" id="sc-at-pnl">
      <div class="sc-label">Total P&amp;L</div>
      <div class="sc-value" id="at-pnl">—</div>
      <div class="sc-sub" id="at-pnl-sub"></div>
    </div>
    <div class="stat-card" id="sc-at-roi">
      <div class="sc-label">All-Time ROI</div>
      <div class="sc-value" id="at-roi">—</div>
      <div class="sc-sub">since first pick</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">All</button>
    <button class="ftab" onclick="setFilter('week',this)">This Week</button>
    <button class="ftab" onclick="setFilter('won',this)">Won</button>
    <button class="ftab" onclick="setFilter('lost',this)">Lost</button>
    <button class="ftab" onclick="setFilter('pending',this)">Pending</button>
  </div>
  <div class="pick-count" id="pick-count"></div>

  <div id="loading" class="loading"><div class="spinner"></div> Loading picks…</div>
  <div id="cards"></div>
  <div id="empty" class="empty" style="display:none">No picks match this filter.</div>

</div>

<script>
  const savedTheme = localStorage.getItem('zm-theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const dark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme:dark)').matches);
    const next = dark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('zm-theme', next);
    document.getElementById('theme-btn').textContent = next === 'dark' ? '☀︎' : '☾';
  }

  let allPicks = [], currentFilter = 'all', weekRange = {};

  function animNum(el, target, pre='', suf='', dec=0) {
    const dur = 600, t0 = performance.now();
    (function step(now) {
      const p = Math.min((now - t0) / dur, 1);
      const e = p < .5 ? 2*p*p : -1+(4-2*p)*p;
      el.textContent = pre + (target * e).toFixed(dec) + suf;
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = pre + target.toFixed(dec) + suf;
    })(performance.now());
  }

  async function load() {
    try {
      const [pr, sr] = await Promise.all([fetch('/api/picks'), fetch('/api/summary')]);
      allPicks = await pr.json();
      const s = await sr.json();
      weekRange = s.weekRange || {};
      renderSummary(s);
      renderCards();
    } catch(e) {
      document.getElementById('loading').innerHTML =
        '<div style="color:var(--loss);font-size:13px;text-transform:none">Could not connect to server.</div>';
    }
  }

  function renderSummary(s) {
    const w = s.thisWeek, a = s.allTime;

    document.getElementById('sw-wl').textContent = `${w.wins}/${w.losses}/${w.pushes}`;
    document.getElementById('sw-wl-sub').textContent = `${w.settled} settled`;

    const pEl = document.getElementById('sw-pnl');
    pEl.className = 'sc-value ' + (w.pnl > 0 ? 'pos' : w.pnl < 0 ? 'neg' : '');
    animNum(pEl, w.pnl, '$', '', 2);
    document.getElementById('sw-pnl-sub').textContent = `$${(w.settled*100).toLocaleString()} staked`;

    const rEl = document.getElementById('sw-roi');
    rEl.className = 'sc-value ' + (w.roi > 0 ? 'pos' : w.roi < 0 ? 'neg' : '');
    animNum(rEl, w.roi, '', '%', 1);

    const pndEl = document.getElementById('sw-pending');
    pndEl.className = 'sc-value ' + (w.pending > 0 ? 'amber' : '');
    animNum(pndEl, w.pending || 0, '', '', 0);
    document.getElementById('sw-pending-sub').textContent =
      (w.pending || 0) === 1 ? 'awaiting result' : 'awaiting results';

    document.getElementById('at-wl').textContent = `${a.wins}W  ${a.losses}L  ${a.pushes}P`;
    document.getElementById('at-wl-sub').textContent =
      `win rate ${a.settled ? ((a.wins/a.settled)*100).toFixed(1) : 0}%`;

    const apEl = document.getElementById('at-pnl');
    apEl.className = 'sc-value ' + (a.pnl > 0 ? 'pos' : a.pnl < 0 ? 'neg' : '');
    animNum(apEl, a.pnl, '$', '', 2);
    document.getElementById('at-pnl-sub').textContent = `${a.settled} settled`;

    const arEl = document.getElementById('at-roi');
    arEl.className = 'sc-value ' + (a.roi > 0 ? 'pos' : a.roi < 0 ? 'neg' : '');
    animNum(arEl, a.roi, '', '%', 1);

    setTimeout(() => document.querySelectorAll('.stat-card').forEach(c => c.classList.add('loaded')), 150);
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function filtered() {
    if (currentFilter === 'week')
      return allPicks.filter(p => p.bet_date >= weekRange.start && p.bet_date <= weekRange.end);
    if (['won','lost','pending'].includes(currentFilter))
      return allPicks.filter(p => p.outcome === currentFilter);
    return allPicks;
  }

  function pnlStr(v) {
    if (v == null) return '—';
    if (v > 0) return '+$' + v.toFixed(2);
    if (v < 0) return '-$' + Math.abs(v).toFixed(2);
    return '$0.00';
  }
  function pnlCls(v) { return v == null ? 'dimmed' : v > 0 ? 'pos' : v < 0 ? 'neg' : 'dimmed'; }

  function renderCards() {
    const rows = filtered();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pick-count').textContent = `${rows.length} pick${rows.length !== 1 ? 's' : ''}`;

    if (!rows.length) {
      document.getElementById('cards').innerHTML = '';
      document.getElementById('empty').style.display = 'block';
      return;
    }
    document.getElementById('empty').style.display = 'none';

    renderedRows = rows;
    document.getElementById('cards').innerHTML = rows.map((p, idx) => {
      const rec = (p.recommendation || '').toUpperCase();
      const recCls = rec === 'OVER' ? 'over' : rec === 'UNDER' ? 'under' : 'dimmed';
      const recIcon = rec === 'OVER' ? '▲ ' : rec === 'UNDER' ? '▼ ' : '';
      const conf = p.confidence != null ? Math.round(p.confidence * 100) : null;
      const ump = (p.umpire || '').split(' ').slice(-1)[0] || 'Unknown ump';

      return `
      <div class="pick-card">
        <div class="stripe ${p.outcome}"></div>
        <div class="card-inner">
          <div class="card-top">
            <div class="teams">
              <div>${p.home_team || '—'}</div>
              <div class="away">${p.away_team || ''} (away)</div>
            </div>
            <span class="badge ${p.outcome}">${p.outcome}</span>
          </div>
          <div class="card-stats">
            <div class="cs">
              <div class="cs-label">Pick</div>
              <div class="cs-value ${recCls}">${recIcon}${rec || '—'}</div>
            </div>
            <div class="cs">
              <div class="cs-label">Line</div>
              <div class="cs-value">${p.market_total ?? '—'}</div>
            </div>
            <div class="cs">
              <div class="cs-label">Actual</div>
              <div class="cs-value">${p.actual_runs ?? '—'}</div>
            </div>
            <div class="cs">
              <div class="cs-label">P&amp;L</div>
              <div class="cs-value ${pnlCls(p.pnl)}">${pnlStr(p.pnl)}</div>
            </div>
          </div>
          ${conf != null ? `
          <div class="conf-wrap">
            <div class="conf-label-row">Confidence</div>
            <div class="conf-row">
              <div class="conf-track"><div class="conf-fill" style="width:${conf}%"></div></div>
              <span class="conf-pct">${conf}%</span>
            </div>
          </div>` : ''}
          <div class="card-footer">
            <span>${p.bet_date}</span>
            <span>${ump}</span>
          </div>
          ${p.outcome === 'pending' ? `
          <div class="stake-row" id="stake-row-${idx}">
            <div class="stake-label">My Bet — $ to win $</div>
            <input class="stake-input" type="number" min="0" step="1"
              placeholder="${p.actual_stake != null ? p.actual_stake : 'Stake'}"
              id="stake-input-${idx}" value="${p.actual_stake != null ? p.actual_stake : ''}">
            <span class="stake-sep">to win</span>
            <input class="stake-input" type="number" min="0" step="1"
              placeholder="${p.actual_to_win != null ? p.actual_to_win : 'To win'}"
              id="towin-input-${idx}" value="${p.actual_to_win != null ? p.actual_to_win : ''}">
            <button class="stake-btn" onclick="saveStake(${idx})">Save</button>
          </div>
          <div class="settle-msg" id="stake-msg-${idx}"></div>
          <div class="settle-row">
            <input class="settle-input" type="number" min="0" step="1"
              placeholder="Final runs (e.g. 9)"
              id="settle-input-${idx}">
            <button class="settle-btn" onclick="settle(${idx})">Settle</button>
          </div>
          <div class="settle-msg" id="settle-msg-${idx}"></div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  let renderedRows = [];

  // Override renderCards to also store rows
  const _renderCards = renderCards;

  async function saveStake(idx) {
    const p = renderedRows[idx];
    if (!p) return;
    const stakeEl  = document.getElementById(`stake-input-${idx}`);
    const towinEl  = document.getElementById(`towin-input-${idx}`);
    const msg      = document.getElementById(`stake-msg-${idx}`);
    const stake    = parseFloat(stakeEl.value);
    const towin    = parseFloat(towinEl.value);
    if (isNaN(stake) || stake <= 0 || isNaN(towin) || towin <= 0) {
      msg.textContent = 'Enter valid amounts.'; msg.className = 'settle-msg err'; return;
    }
    msg.textContent = 'Saving…'; msg.className = 'settle-msg';
    try {
      const r = await fetch('/api/bet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          home_team: p.home_team, away_team: p.away_team,
          bet_date: p.bet_date, actual_stake: stake, actual_to_win: towin
        })
      });
      const data = await r.json();
      if (!r.ok) { msg.textContent = data.error || 'Error.'; msg.className = 'settle-msg err'; return; }
      msg.textContent = `Saved — $${stake} to win $${towin}`; msg.className = 'settle-msg ok';
      p.actual_stake = stake; p.actual_to_win = towin;
    } catch(e) { msg.textContent = 'Network error.'; msg.className = 'settle-msg err'; }
  }

  async function settle(idx) {
    const p = renderedRows[idx];
    if (!p) return;
    const input = document.getElementById(`settle-input-${idx}`);
    const msg   = document.getElementById(`settle-msg-${idx}`);
    const runs  = parseFloat(input.value);
    if (isNaN(runs) || runs < 0) {
      msg.textContent = 'Enter a valid run total.'; msg.className = 'settle-msg err'; return;
    }
    msg.textContent = 'Saving…'; msg.className = 'settle-msg';
    try {
      const r = await fetch('/api/settle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          home_team: p.home_team, away_team: p.away_team,
          bet_date: p.bet_date, actual_runs: runs
        })
      });
      const data = await r.json();
      if (!r.ok) { msg.textContent = data.error || 'Error.'; msg.className = 'settle-msg err'; return; }
      const pnlStr = data.pnl > 0 ? `+$${data.pnl.toFixed(2)}` : data.pnl < 0 ? `-$${Math.abs(data.pnl).toFixed(2)}` : '$0';
      msg.textContent = `${data.outcome.toUpperCase()} — ${pnlStr}`; msg.className = 'settle-msg ok';
      setTimeout(load, 800);
    } catch(e) { msg.textContent = 'Network error.'; msg.className = 'settle-msg err'; }
  }

  load();
  setInterval(load, 5 * 60 * 1000);
</script>
